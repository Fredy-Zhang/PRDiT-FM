# Small end-to-end configuration for functional validation.
data:
  image_size: 64
  path: ""
  train_list: "lidc_data/train.txt"
  val_list: "lidc_data/val.txt"
  task: "lidc"
  num_workers: 0
  val_frac: 0.1
  augment: False
  normalize: True

model:
  name: "HR512HourglassFlow"
  in_channels: 1
  out_channels: 1
  num_classes: 1
  num_sampling_steps: 4
  from_scratch: True
  pretrained_path: ""
  checkpoint: ""
  flash_attn: True
  channels_256: 4
  channels_128: 8
  transformer_hidden_size: 48
  transformer_depth: 2
  transformer_heads: 4
  bottleneck_patch_size: 4
  local_hidden_channels: 2
  skip_channels_256: 2
  skip_channels_512: 1
  gradient_checkpointing: True
  feature_checkpointing: True

flow_matching:
  lambda_local: 1.0
  lambda_128: 1.0
  lambda_256: 1.0
  lambda_512: 1.0
  lambda_full: 1.0
  residual_warmup_start_steps: 2
  residual_warmup_steps: 4
  residual_warmup_initial_weight: 0.1

training:
  batch_size: 1
  gradient_accumulation_steps: 1
  precision: "bf16"
  learning_rate: 8e-5
  total_steps: 4
  seed: 42
  weight_decay: 0.0
  gradient_clip: 1.0
  ema: 0.999
  num_gen_samples: 1

output:
  results_dir: "results_lidc_hourglass_smoke"
  checkpoint_dir: "checkpoints"

logging:
  log_every: 1
  ckpt_every: 4
  eval_every: 4

wandb:
  project: ""
  entity: ""
  tags: "hourglass-smoke"
  enable: False

